# 任意分支 push 都会跑，用于确认仓库是否启用 Actions、webhook 是否正常（确认后再收紧 branches 亦可）。
name: CI smoke (ubuntu)

'on':
  workflow_dispatch:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity
        run: |
          set -euo pipefail
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_SHA=$GITHUB_SHA"
          test -f CMakeLists.txt
